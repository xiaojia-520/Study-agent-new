<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Agent UI</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #0f1117;
        color: #e6e9f2;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
      }
      #app {
        height: 100vh;
      }
      .app-shell {
        display: flex;
        height: 100%;
        background: #0f1117;
      }
      .sidebar {
        width: 240px;
        background: #171a23;
        border-right: 1px solid #2a2f3a;
        display: flex;
        flex-direction: column;
        transition: width 0.2s ease;
        overflow: hidden;
      }
      .sidebar.collapsed {
        width: 72px;
      }
      .sidebar header {
        padding: 16px;
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .sidebar nav {
        padding: 0 16px 16px;
        display: grid;
        gap: 12px;
        font-size: 14px;
      }
      .sidebar button {
        background: #2b3240;
        color: inherit;
        border: none;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
      }
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .toolbar {
        padding: 12px 16px;
        border-bottom: 1px solid #242833;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #121521;
      }
      .toolbar .controls {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .toolbar button {
        background: #2e6bff;
        border: none;
        color: white;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      .toolbar button.secondary {
        background: #2b3240;
      }
      .workspace {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      .split-container {
        flex: 1;
        display: flex;
        min-width: 0;
        position: relative;
        padding: 16px;
        gap: 0;
      }
      .panel {
        background: #161a26;
        border: 1px solid #242833;
        border-radius: 12px;
        padding: 16px;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .panel h3 {
        margin: 0;
        font-size: 16px;
      }
      .left-pane {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 0;
      }
      .horizontal-split {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .splitter {
        background: #2b3240;
        z-index: 2;
      }
      .splitter.vertical {
        width: 6px;
        cursor: col-resize;
        margin: 0 8px;
        border-radius: 6px;
      }
      .splitter.horizontal {
        height: 6px;
        cursor: row-resize;
        margin: 8px 0;
        border-radius: 6px;
      }
      .obs-placeholder {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #9aa3b2;
        font-size: 14px;
        border: 1px dashed #394051;
        border-radius: 12px;
        min-height: 120px;
      }
      .transcript {
        flex: 1;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .transcript .final {
        background: #202532;
        padding: 10px 12px;
        border-radius: 10px;
      }
      .transcript .partial {
        color: #7fb4ff;
        font-style: italic;
      }
      .chat-placeholder {
        flex: 1;
        color: #9aa3b2;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px dashed #394051;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-shell">
        <aside class="sidebar" :class="{ collapsed: !sidebarOpen }">
          <header>
            <span v-if="sidebarOpen">Control</span>
            <button @click="toggleSidebar">{{ sidebarOpen ? '收起' : '展开' }}</button>
          </header>
          <nav v-if="sidebarOpen">
            <div>项目：Study Agent</div>
            <div>模式：实时语音</div>
            <div>状态：{{ isStreaming ? '采集中' : '空闲' }}</div>
          </nav>
        </aside>

        <main class="main">
          <div class="toolbar">
            <div>Streaming Workspace</div>
            <div class="controls">
              <button class="secondary" @click="toggleSidebar">{{ sidebarOpen ? '隐藏侧边栏' : '显示侧边栏' }}</button>
              <button v-if="!isStreaming" @click="startStreaming">开始采集</button>
              <button v-else class="secondary" @click="stopStreaming">停止采集</button>
            </div>
          </div>

          <section class="workspace">
            <div class="split-container" ref="mainSplit">
              <section
                class="panel left-pane"
                :style="{ flex: `0 0 ${leftWidth * 100}%` }"
                ref="leftPane"
              >
                <div class="horizontal-split">
                  <div class="panel" :style="{ flex: `0 0 ${topHeight * 100}%` }">
                    <h3>OBS 推流区域（预留）</h3>
                    <div class="obs-placeholder">留作 OBS 预览区域</div>
                  </div>
                  <div class="splitter horizontal" @mousedown="startResize('horizontal')"></div>
                  <div class="panel" style="flex: 1">
                    <h3>实时文本输出</h3>
                    <div class="transcript">
                      <div v-for="(line, index) in finalTexts" :key="index" class="final">
                        {{ line }}
                      </div>
                      <div v-if="partialText" class="partial">{{ partialText }}</div>
                    </div>
                  </div>
                </div>
              </section>

              <div class="splitter vertical" @mousedown="startResize('vertical')"></div>

              <section class="panel" style="flex: 1">
                <h3>AI 对话区（预留）</h3>
                <div class="chat-placeholder">后续接入 AI 对话 UI</div>
              </section>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            sidebarOpen: true,
            leftWidth: 0.55,
            topHeight: 0.6,
            resizing: null,
            isStreaming: false,
            ws: null,
            audioContext: null,
            processor: null,
            source: null,
            mediaStream: null,
            finalTexts: [],
            partialText: "",
            wsUrl: "ws://127.0.0.1:8000/ws/audio",
          };
        },
        mounted() {
          window.addEventListener("mousemove", this.onMouseMove);
          window.addEventListener("mouseup", this.stopResize);
        },
        beforeUnmount() {
          window.removeEventListener("mousemove", this.onMouseMove);
          window.removeEventListener("mouseup", this.stopResize);
          this.stopStreaming();
        },
        methods: {
          toggleSidebar() {
            this.sidebarOpen = !this.sidebarOpen;
          },
          startResize(direction) {
            this.resizing = direction;
          },
          onMouseMove(event) {
            if (!this.resizing) return;
            if (this.resizing === "vertical") {
              const rect = this.$refs.mainSplit.getBoundingClientRect();
              let ratio = (event.clientX - rect.left) / rect.width;
              ratio = Math.min(0.75, Math.max(0.25, ratio));
              this.leftWidth = ratio;
            }
            if (this.resizing === "horizontal") {
              const rect = this.$refs.leftPane.getBoundingClientRect();
              let ratio = (event.clientY - rect.top) / rect.height;
              ratio = Math.min(0.75, Math.max(0.25, ratio));
              this.topHeight = ratio;
            }
          },
          stopResize() {
            this.resizing = null;
          },
          async startStreaming() {
            if (this.isStreaming) return;
            this.finalTexts = [];
            this.partialText = "";

            this.ws = new WebSocket(this.wsUrl);
            this.ws.binaryType = "arraybuffer";

            await new Promise((resolve, reject) => {
              this.ws.onopen = resolve;
              this.ws.onerror = reject;
            });

            this.ws.onmessage = (event) => {
              try {
                const data = JSON.parse(event.data);
                if (data.type === "partial") {
                  this.partialText = data.text;
                }
                if (data.type === "final") {
                  this.finalTexts.push(data.text);
                  this.partialText = "";
                }
              } catch (error) {
                console.warn("无法解析消息", error);
              }
            };

            this.mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            this.audioContext = new AudioContext({ sampleRate: 16000 });
            this.source = this.audioContext.createMediaStreamSource(this.mediaStream);
            this.processor = this.audioContext.createScriptProcessor(4096, 1, 1);

            this.processor.onaudioprocess = (event) => {
              if (!this.ws || this.ws.readyState !== WebSocket.OPEN) return;
              const input = event.inputBuffer.getChannelData(0);
              const buffer = new Float32Array(input);
              this.ws.send(buffer.buffer);
            };

            this.source.connect(this.processor);
            this.processor.connect(this.audioContext.destination);

            this.isStreaming = true;
          },
          async stopStreaming() {
            if (!this.isStreaming) return;
            this.isStreaming = false;

            if (this.processor) {
              this.processor.disconnect();
              this.processor.onaudioprocess = null;
              this.processor = null;
            }
            if (this.source) {
              this.source.disconnect();
              this.source = null;
            }
            if (this.audioContext) {
              await this.audioContext.close();
              this.audioContext = null;
            }
            if (this.mediaStream) {
              this.mediaStream.getTracks().forEach((track) => track.stop());
              this.mediaStream = null;
            }
            if (this.ws) {
              this.ws.close();
              this.ws = null;
            }
          },
        },
      }).mount("#app");
    </script>
  </body>
</html>
